<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Fundo verde com bordas arredondadas -->
  <rect width="512" height="512" rx="112" fill="#059669"/>
  <!-- Gradiente sutil -->
  <rect width="512" height="512" rx="112" fill="url(#grad)"/>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#064e3b" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#059669" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Corpo do calendário -->
  <rect x="96" y="130" width="320" height="272" rx="28" fill="none" stroke="white" stroke-width="22"/>
  <!-- Cabeçalho do calendário -->
  <rect x="96" y="130" width="320" height="100" rx="28" fill="rgba(255,255,255,0.22)"/>
  <rect x="96" y="196" width="320" height="34" fill="rgba(255,255,255,0.22)"/>

  <!-- Linha divisória -->
  <line x1="96" y1="230" x2="416" y2="230" stroke="white" stroke-width="8" stroke-opacity="0.3"/>

  <!-- Pinos do calendário -->
  <rect x="168" y="88" width="36" height="88" rx="18" fill="white" fill-opacity="0.9"/>
  <rect x="308" y="88" width="36" height="88" rx="18" fill="white" fill-opacity="0.9"/>

  <!-- Grade de dias - Linha 1 -->
  <rect x="112" y="252" width="48" height="40" rx="8" fill="white" fill-opacity="0.35"/>
  <rect x="172" y="252" width="48" height="40" rx="8" fill="white"/>
  <rect x="232" y="252" width="48" height="40" rx="8" fill="white" fill-opacity="0.35"/>
  <rect x="292" y="252" width="48" height="40" rx="8" fill="white" fill-opacity="0.35"/>
  <rect x="352" y="252" width="48" height="40" rx="8" fill="white" fill-opacity="0.35"/>
  <!-- Grade de dias - Linha 2 -->
  <rect x="112" y="304" width="48" height="40" rx="8" fill="white" fill-opacity="0.35"/>
  <rect x="172" y="304" width="48" height="40" rx="8" fill="white" fill-opacity="0.35"/>
  <rect x="232" y="304" width="48" height="40" rx="8" fill="white" fill-opacity="0.35"/>
  <rect x="292" y="304" width="48" height="40" rx="8" fill="white" fill-opacity="0.35"/>
  <rect x="352" y="304" width="48" height="40" rx="8" fill="white" fill-opacity="0.35"/>

  <!-- Cursor (seta do mouse) -->
  <path d="M300 340 L300 430 L326 404 L348 450 L368 441 L346 395 L382 395 Z"
    fill="white" stroke="#064e3b" stroke-width="10" stroke-linejoin="round"/>
</svg>
