<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#145c2e"/>
      <stop offset="100%" stop-color="#25994f"/>
    </linearGradient>
    <linearGradient id="cal" x1="100" y1="130" x2="100" y2="410" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e8f5ee"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000000" flood-opacity="0.22"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="104" fill="url(#bg)"/>

  <!-- Calendar card -->
  <rect x="88" y="128" width="336" height="272" rx="24" fill="url(#cal)" filter="url(#shadow)"/>

  <!-- Calendar header bar -->
  <rect x="88" y="128" width="336" height="88" rx="24" fill="#1a7a40"/>
  <rect x="88" y="176" width="336" height="40" fill="#1a7a40"/>

  <!-- Header text: month label (decorative lines) -->
  <rect x="168" y="155" width="96" height="10" rx="5" fill="white" fill-opacity="0.5"/>
  <rect x="248" y="155" width="64" height="10" rx="5" fill="white" fill-opacity="0.3"/>

  <!-- Calendar hooks (top rings) -->
  <rect x="178" y="96" width="28" height="72" rx="14" fill="white" fill-opacity="0.92"/>
  <rect x="306" y="96" width="28" height="72" rx="14" fill="white" fill-opacity="0.92"/>

  <!-- Day grid — row 1 -->
  <rect x="118" y="242" width="40" height="40" rx="8" fill="#d1eedd"/>
  <rect x="176" y="242" width="40" height="40" rx="8" fill="#d1eedd"/>
  <rect x="234" y="242" width="40" height="40" rx="8" fill="#d1eedd"/>
  <!-- highlighted selected day -->
  <rect x="292" y="238" width="48" height="48" rx="12" fill="#1a7a40"/>
  <!-- checkmark on selected day -->
  <path d="M303 262 L311 272 L328 253" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <rect x="350" y="242" width="40" height="40" rx="8" fill="#d1eedd"/>

  <!-- Day grid — row 2 -->
  <rect x="118" y="302" width="40" height="40" rx="8" fill="#d1eedd"/>
  <rect x="176" y="302" width="40" height="40" rx="8" fill="#d1eedd"/>
  <rect x="234" y="302" width="40" height="40" rx="8" fill="#d1eedd"/>
  <rect x="292" y="302" width="40" height="40" rx="8" fill="#d1eedd"/>
  <rect x="350" y="302" width="40" height="40" rx="8" fill="#d1eedd"/>

  <!-- Click cursor (bottom-right overlay) -->
  <g transform="translate(330, 330)">
    <path d="M20 8 L20 68 L36 52 L50 82 L62 76 L48 46 L68 46 Z"
      fill="#5bdc85" stroke="white" stroke-width="5"
      stroke-linejoin="round" stroke-linecap="round"/>
  </g>
</svg>
